*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sailec', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; font-size: 13px; }
:root {
  --bg: #FBEAD8;
  --surface: #FFFFFF;
  --surface2: #E9D3BC;
  --border: #D4C5AF;
  --text: #33342C;
  --text-muted: #5A5840;
  --accent: #A6A384;
  --accent-light: #ECEADF;
  --danger: #c0392b;
  --warning-bg: #fdefd8;
  --warning-text: #7A4A15;
}

.app { display: flex; flex-direction: column; height: 100vh; }

/* TOPBAR */
.topbar { background: #33342C; color: white; padding: 0 16px; display: flex; align-items: center; gap: 12px; height: 48px; flex-shrink: 0; }
.topbar-title { align-items: flex-start !important; }
.topbar-title h1 { font-size: 14px; font-weight: 700; white-space: nowrap; font-family: 'Sailec', sans-serif; }
.topbar-title p { font-size: 10px; opacity: 0.6; }
.search-wrap { position: relative; max-width: 220px; width: 220px; margin-left: auto; }
.search-input { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; padding: 6px 12px 6px 32px; color: white; font-size: 13px; outline: none; transition: background 0.15s, border-color 0.15s; }
.search-input::placeholder { color: rgba(255,255,255,0.45); }
.search-input:focus { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.35); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; opacity: 0.5; pointer-events: none; }
.search-dropdown { position: absolute; top: calc(100% + 6px); left: 0; min-width: 260px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 28px rgba(0,0,0,0.18); z-index: 9999; overflow: hidden; display: none; }
.search-result { display: flex; align-items: center; gap: 10px; padding: 8px 14px; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--border); }
.search-result:last-child { border-bottom: none; }
.search-result:hover { background: var(--surface2); }
.search-result-name { font-size: 13px; font-weight: 600; color: var(--text); }
.search-result-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.search-no-results { padding: 14px; font-size: 12px; color: var(--text-muted); text-align: center; }
.view-toggle { display: flex; background: rgba(255,255,255,0.12); border-radius: 6px; padding: 2px; }
.view-toggle button { background: none; border: none; color: rgba(255,255,255,0.7); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; font-family: 'Sailec', sans-serif; }
.view-toggle button.active { background: rgba(255,255,255,0.2); color: white; }
.proj-wrap { display: none; align-items: center; gap: 6px; color: rgba(255,255,255,0.7); font-size: 12px; }
.proj-wrap.visible { display: flex; }
.proj-wrap input { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 4px; padding: 3px 7px; font-size: 12px; }
.btn-top { background: #9F5E35; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; transition: background 0.15s; font-family: 'Sailec', sans-serif; }
.btn-top:hover { background: #8A5030; }
.btn-top.secondary { background: #33342C; border: 1px solid rgba(255,255,255,0.25); }
.btn-top.secondary:hover { background: #4A4B40; }

/* MAIN LAYOUT */
.main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 190px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 10px 0; }
.sidebar-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); padding: 8px 14px 4px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px; cursor: pointer; font-size: 12px; color: var(--text-muted); border-radius: 0; transition: background 0.1s; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--text); border-left-color: var(--accent); font-weight: 600; }
.team-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

function parseAndFixState(raw) {
  if (raw && raw.people) {
    raw.people.forEach(p => {
      if (!p.supportsIds) { p.supportsIds = p.supportsId ? [p.supportsId] : []; }
      delete p.supportsId;
      if (p.aum === undefined) p.aum = null;
    });
  }
  return raw;
}

async function loadState() {
  // Try Supabase first
  if (_supabase && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
    try {
      const { data, error } = await _supabase
        .from('headcount_state')
        .select('data')
        .eq('id', 'main')
        .single();
      if (!error && data?.data?.people) {
        return parseAndFixState(data.data);
      }
    } catch(e) { console.warn('Supabase load failed, using localStorage fallback', e); }
  }
  // Fallback: localStorage (for local dev / first load before Supabase is configured)
  try {
    const s = localStorage.getItem('rootHeadcount_v3');
    if (s) return parseAndFixState(JSON.parse(s));
  } catch(e) {}
  return { people: JSON.parse(JSON.stringify(INITIAL_PEOPLE)), events: JSON.parse(JSON.stringify(INITIAL_EVENTS)), lastSaved: null };
}

async function saveState() {
  state.lastSaved = new Date().toISOString();
  // Save to Supabase
  if (_supabase && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
    try {
      await _supabase
        .from('headcount_state')
        .upsert({ id: 'main', data: state, updated_at: state.lastSaved });
    } catch(e) { console.warn('Supabase save failed', e); }
  }
  // Always keep localStorage as a local backup
  try { localStorage.setItem('rootHeadcount_v3', JSON.stringify(state)); } catch(e) {}
}


// Real-time sync: when another browser/user saves, refresh our state
function subscribeToRealtime() {
  if (!_supabase || SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
  _supabase
    .channel('headcount_realtime')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'headcount_state', filter: 'id=eq.main' }, payload => {
      const incoming = payload.new?.data;
      if (!incoming) return;
      // Only update if the change came from someone else (different lastSaved)
      if (incoming.lastSaved !== state.lastSaved) {
        state = migrateState(parseAndFixState(incoming));
        render();
      }
    })
    .subscribe();
}

async function init() {
  state = migrateState(await loadState());
  subscribeToRealtime();
  render();
}

function getProjDate() {
  const v = document.getElementById('proj-date').value;

function getVisiblePeople() {
  const todayStr = new Date().toISOString().split('T')[0];
  const cutoffStr = currentView === 'current'
    ? todayStr
    : (document.getElementById('proj-date')?.value || todayStr);
  const visible = JSON.parse(JSON.stringify(state.people));
  state.events.forEach(ev => {
    if (!ev.date || ev.date > cutoffStr) return;
    if (ev.type === 'new_hire') {
      // Always create a fresh person — never reuse an existing person for new_hire
      const newP = { id: 'nh_' + ev.id, first: ev.newFirst || '', last: ev.newLast || '', role: ev.toRole || 'AFA2', team: ev.toTeam || '', dept: (ev.toRole || '').startsWith('CS') ? 'Client Service' : 'Advisory', status: 'active', criteria: {}, aum: null, supportsIds: ev.supportsIds || [] };
      visible.push(newP);
      return;
    }
    let p = visible.find(x => x.id === ev.personId);
    if (!p) return;
    if (ev.type === 'on_leave') p.status = 'leave';
    else if (ev.type === 'return') p.status = 'active';
    else if (ev.type === 'departure') { visible.splice(visible.indexOf(p), 1); }
    else if (ev.type === 'promotion') { p.role = ev.toRole; if (ev.toTeam) p.team = ev.toTeam; }
    else if (ev.type === 'team_move') p.team = ev.toTeam;
  });
  return visible;
}

function updateChangesList() {
  const list = document.getElementById('changes-list');
  const count = document.getElementById('change-count');
  const todayStr = new Date().toISOString().split('T')[0];

  // Split into upcoming (future) and applied (today or earlier)
  const upcoming = state.events.filter(ev => !ev.date || ev.date > todayStr);
  const applied  = state.events.filter(ev => ev.date && ev.date <= todayStr);

  count.textContent = upcoming.length;

  // Update mobile badge (only upcoming)
  const badge = document.getElementById('mob-changes-badge');
  if (badge) {
    badge.textContent = upcoming.length || '';
    badge.classList.toggle('show', upcoming.length > 0);
  }

  if (state.events.length === 0) {
    list.innerHTML = '<div class="empty-msg"><div class="eicon">📋</div>No planned changes yet</div>';
    return;
  }

  function buildEventCard(ev, dimmed) {
    const evType = EVENT_TYPES.find(x => x.value === ev.type);
    const ctClass = 'ct-' + ev.type;
    const p = ev.personId ? state.people.find(x => x.id === ev.personId) : null;
    const pName = p ? `${p.first} ${p.last}` : '';
    const dateStr = ev.date ? new Date(ev.date + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '';
    let name = '', detail = '';
    if (ev.type === 'new_hire') {
      name = `${ev.newFirst || ''} ${ev.newLast || ''}`.trim() || 'New Hire';
      detail = [ev.toRole, ev.toTeam].filter(Boolean).join(' · ');
    } else if (ev.type === 'promotion') {
      name = pName || 'Unknown';
      const roleStr = (p && ev.toRole) ? `${p.role} → ${ev.toRole}` : (ev.toRole || '');
      detail = [roleStr, ev.toTeam || (p ? p.team : '')].filter(Boolean).join(' · ');
    } else if (ev.type === 'team_move') {
      name = pName || 'Unknown';
      const fromTeam = p ? p.team : '';
      detail = fromTeam && ev.toTeam ? `${fromTeam} → ${ev.toTeam}` : (ev.toTeam || '');
    } else if (ev.type === 'backfill') {
      name = p ? pName : (ev.toRole ? `${ev.toRole} Backfill` : 'Open Position');
      detail = ev.toTeam || (p ? p.team : '');
    } else if (ev.type === 'departure') {
      name = pName || 'Unknown';
      detail = p ? `${p.role} · ${p.team}` : '';
    } else {
      name = pName || 'Unknown';
    }
    const dimStyle = dimmed ? 'opacity:0.55;' : '';
    const appliedBadge = dimmed ? `<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;background:#d4edda;color:#155724;margin-left:4px">✓ applied</span>` : '';
    return `<div class="citem" style="${dimStyle}" onclick="editEvent('${ev.id}')">
      <span class="ctag ${ctClass}">${evType ? evType.label : ev.type}</span>${appliedBadge}
      <div class="ci-name">${name}</div>
      ${detail ? `<div class="ci-detail">${detail}</div>` : ''}
      ${dateStr ? `<div class="ci-date">${dateStr}</div>` : ''}
    </div>`;
  }

  // Sort upcoming by date ascending
  const sorted = [...upcoming].sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const sortedApplied = [...applied].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  let html = sorted.map(ev => buildEventCard(ev, false)).join('');

  if (applied.length > 0) {
    const divider = upcoming.length > 0
      ? `<div style="margin:10px 0 6px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted)">Applied</div>`
      : `<div style="margin-bottom:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted)">Applied</div>`;
    html += divider + sortedApplied.map(ev => buildEventCard(ev, true)).join('');
  }

  list.innerHTML = html || '<div class="empty-msg"><div class="eicon">📋</div>No planned changes yet</div>';
}

function avatarEl(p, size, bg, textColor, initials, hasPromo) {
  const wrap = document.createElement('div');
  wrap.style.cssText = `position:relative;width:${size}px;height:${size}px;flex-shrink:0`;
  const src = PHOTO_DATA[p.id];
  let inner;
  if (src) {
    inner = document.createElement('img');
    inner.src = src;
    inner.style.cssText = `width:100%;height:100%;border-radius:50%;object-fit:cover;display:block`;
  } else {
    inner = document.createElement('div');
    inner.style.cssText = `width:100%;height:100%;border-radius:50%;background:${bg};color:${textColor};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size/2.5)}px;font-weight:700`;
    inner.textContent = initials;
  }
  wrap.appendChild(inner);
  if (hasPromo) { const d = document.createElement('div'); d.className = 'sv-promo-dot'; wrap.appendChild(d); }
  // Projected new hire: green dot on avatar corner
  if (currentView === 'projected' && p.id && p.id.startsWith('nh_')) {
    const dot = document.createElement('div');
    const ds = Math.max(8, Math.round(size / 4));
    dot.style.cssText = `position:absolute;bottom:0;right:0;width:${ds}px;height:${ds}px;border-radius:50%;background:#28a745;border:2px solid #fff;box-sizing:border-box`;
    wrap.appendChild(dot);
  }
  // Projected promotion: orange dot on avatar corner
  if (currentView === 'projected' && p.id && !p.id.startsWith('nh_')) {
    const current = state.people.find(x => x.id === p.id);
    if (current && current.role !== p.role) {
      const dot = document.createElement('div');
      const ds = Math.max(8, Math.round(size / 4));
      dot.style.cssText = `position:absolute;bottom:0;right:0;width:${ds}px;height:${ds}px;border-radius:50%;background:#9F5E35;border:2px solid #fff;box-sizing:border-box`;
      dot.title = `Promoted: ${current.role} → ${p.role}`;
      wrap.appendChild(dot);
    }
  }
  return wrap;
}

function criteriaBarEl(p) {
  let criteriaKey = null;
  if (p.role === 'AFA2' || p.role === 'AFA1') criteriaKey = 'AFA2→FA';
  else if (p.role === 'FA') criteriaKey = 'FA→LFA';
  if (!criteriaKey) return null;
  const crits = PROMO_CRITERIA[criteriaKey];
  if (!crits || !crits.length) return null;
  const checked = crits.filter(c => p.criteria && p.criteria[c.key]).length;
  if (checked === 0) return null;
  const total = crits.length;
  const pct = Math.round((checked / total) * 100);
  const done = checked === total;
  const wrap = document.createElement('div');
  wrap.style.cssText = 'margin-top:4px;width:100%';
  const lbl = document.createElement('div');
  lbl.style.cssText = `font-size:8px;font-weight:600;letter-spacing:0.3px;margin-bottom:2px;color:${done ? '#28a745' : 'var(--text-muted)'}`;
  lbl.textContent = (done ? '✓ ' : '') + checked + '/' + total + ' criteria';
  wrap.appendChild(lbl);
  const track = document.createElement('div');
  track.style.cssText = 'height:3px;background:var(--border);border-radius:2px;overflow:hidden;width:100%';
  const fill = document.createElement('div');
  fill.style.cssText = `height:100%;width:${pct}%;border-radius:2px;background:${done ? '#28a745' : '#9F5E35'};transition:width 0.3s`;
  track.appendChild(fill);
  wrap.appendChild(track);
  return wrap;
}

function aumBarEl(p) {
  if (!['LFA','FA'].includes(p.role) || p.aum === null) return null;
  const threshold = AUM_THRESHOLDS[p.role];
  const pct = Math.min(100, (p.aum / threshold) * 100);
  const qual = p.aum >= threshold;
  const wrap = document.createElement('div'); wrap.className = 'sv-aum-wrap';
  const lbl  = document.createElement('div'); lbl.className = 'sv-aum-label' + (qual ? ' sv-aum-qualified' : '');
  lbl.textContent = (qual ? '✓ ' : '') + '$' + p.aum + 'M' + (qual ? ' AFA eligible' : ' / $' + AUM_THRESHOLDS[p.role] + 'M');
  wrap.appendChild(lbl);
  const track = document.createElement('div'); track.className = 'sv-aum-track';
  const fill  = document.createElement('div'); fill.className = 'sv-aum-fill' + (qual ? ' sv-aum-done' : '');
  fill.style.width = pct + '%';
  track.appendChild(fill); wrap.appendChild(track);
  return wrap;
}

    inc.style.cssText = 'font-size:8px;font-weight:700;letter-spacing:0.4px;padding:1px 6px;border-radius:8px;background:#d4edda;color:#155724;border:1px solid #b8dac0;margin-top:1px;white-space:nowrap';
    inc.textContent = 'Incoming';
    chip.appendChild(inc);
  }
  if (isPromoted) {
    const cur = state.people.find(x => x.id === p.id);
    const pr = document.createElement('div');
    pr.style.cssText = 'font-size:8px;font-weight:700;letter-spacing:0.4px;padding:1px 6px;border-radius:8px;background:#fde8d8;color:#7a3a10;border:1px solid #f5c5a3;margin-top:1px;white-space:nowrap';
    pr.textContent = `↑ ${cur.role}→${p.role}`;

  const bar = aumBarEl(p);
  if (bar) chip.appendChild(bar);

  if (critBar) chip.appendChild(critBar);
  return chip;
}

    const roleGroups = [
      { roles:['SA','LFA','FA'],   label:'Seq' },
      { roles:['AFA2','AFA1'],     label:'Assoc' },
      { roles:['CSA','CSC'],       label:'CS' },
    ];
    roleGroups.forEach(({roles, label}) => {
      const ppl = teamPeople.filter(p => roles.includes(p.role)).sort((a,b) => {
        const ri = roles.indexOf(a.role) - roles.indexOf(b.role);
        return ri !== 0 ? ri : a.first.localeCompare(b.first);
      });
      if (!ppl.length) return;
      const row = document.createElement('div');
      row.className = 'ov-role-row';
      // Pick color from first role in group that appears
      const rc = ROLE_COLORS[ppl[0].role];
      row.innerHTML = `<span class="ov-role-lbl" style="background:${rc.bg};color:${rc.text}">${label}</span>
        <div class="ov-chips">${ppl.map(p => `<span class="ov-chip">${p.first} ${p.last}</span>`).join('')}</div>`;
      membersDiv.appendChild(row);
    });
    card.appendChild(membersDiv);
    grid.appendChild(card);
  });

  // Total + backfill card
  const backfills = allPeople.filter(p => p.status === 'backfill');
  let bfHtml = backfills.length
    ? backfills.map(p => `<div class="backfill-item">• ${p.first} ${p.last} (${p.team} · ${p.role})</div>`).join('')
    : '<div class="backfill-item" style="font-style:italic">None currently</div>';
  const totalCard = document.createElement('div');
  totalCard.className = 'stat-card';
  totalCard.innerHTML = `<h3 style="margin-bottom:6px">Total <span style="font-weight:400;color:var(--text-muted);font-size:12px">${active.length} people</span></h3>
    <div class="team-breakdown">
      ${['SA','LFA','FA','AFA2','AFA1','CSA','CSC'].map(r => {
        const n = active.filter(p => p.role===r).length;
        return n ? `<div class="team-row"><div class="dot" style="background:${ROLE_COLORS[r].bg}"></div><span style="font-size:10px;color:${ROLE_COLORS[r].text};font-weight:700">${r}</span><strong>${n}</strong></div>` : '';
      }).join('')}
    </div>
    <h3 style="margin-top:12px;margin-bottom:6px;font-size:11px">Backfill Needs</h3>
    <div class="backfill-list">${bfHtml}</div>`;
  grid.appendChild(totalCard);

  el.appendChild(grid);
}

// ── Role Grid (matrix view) ──────────────────────────────────────────────────
function renderRoleGrid(el, team, people, allPeople) {
  const sa = people.find(p => p.role === 'SA');
  const lfas = people.filter(p => p.role === 'LFA').sort((a,b) => a.first.localeCompare(b.first));
  const fas  = people.filter(p => p.role === 'FA').sort((a,b) => a.first.localeCompare(b.first));
  const afas = people.filter(p => p.role === 'AFA2' || p.role === 'AFA1').sort((a,b) => {
    const r = a.role.localeCompare(b.role); return r !== 0 ? r : a.first.localeCompare(b.first);
  });
  const csList = people.filter(p => p.role === 'CSA' || p.role === 'CSC').sort((a,b) => a.first.localeCompare(b.first));

  const podLeaders = [];
  if (sa) podLeaders.push(sa);
  lfas.forEach(l => podLeaders.push(l));
  fas.forEach(f => podLeaders.push(f));

  function primaryPodLeaderId(person) {
    if (!person.supportsIds || !person.supportsIds.length) return null;
    const leadId = person.supportsIds[0];
    const lead = allPeople.find(p => p.id === leadId);
    return (lead && ['SA','LFA','FA'].includes(lead.role)) ? leadId : null;
  }
  function resolvedPodIdForTarget(targetId) {
    const person = allPeople.find(p => p.id === targetId);
    if (!person) return null;
    if (['SA','LFA','FA'].includes(person.role)) return targetId;
    const lid = primaryPodLeaderId(person);
    return lid || null;
  }

  const csInfoMap = new Map();
  csList.forEach(cs => {
    const color = CS_ARROW_COLORS[csInfoMap.size % CS_ARROW_COLORS.length];
    const podIds = new Set();
    (cs.supportsIds || []).forEach(id => { const r = resolvedPodIdForTarget(id); if (r) podIds.add(r); });
    csInfoMap.set(cs.id, { person: cs, color, podIds });
  });

  const podToCsIds = new Map();
  podLeaders.forEach(pl => podToCsIds.set(pl.id, []));
  csInfoMap.forEach((info, csId) => {
    info.podIds.forEach(podId => { if (podToCsIds.has(podId)) podToCsIds.get(podId).push(csId); });
  });

  const groupMap = new Map();
  podLeaders.forEach(pl => {
    const fp = (podToCsIds.get(pl.id) || []).slice().sort().join(',') || '__none__';
    if (!groupMap.has(fp)) groupMap.set(fp, []);
    groupMap.get(fp).push(pl);
  });

  let sortedGroups = Array.from(groupMap.values());

  // Place SA at the center column of the entire grid, keeping CS groups intact
  if (sa) {
    const saGrpIdx = sortedGroups.findIndex(g => g.some(p => p.id === sa.id));
    if (saGrpIdx !== -1) {
      const saGrp = sortedGroups[saGrpIdx];
      const otherGroups = sortedGroups.filter((_, i) => i !== saGrpIdx);
      const N_total = sortedGroups.reduce((s, g) => s + g.length, 0);

      // SA should land at Math.floor((N_total - 1) / 2) (0-indexed)
      const targetSaCol = Math.floor((N_total - 1) / 2);
      // SA's offset within its group (centered within that group)
      const saInGroup  = Math.floor((saGrp.length - 1) / 2);
      // How many columns must appear before SA's group
      const targetLeft = Math.max(0, targetSaCol - saInGroup);

      // Greedily fill left side up to targetLeft columns (largest groups first)
      const leftGroups = [], rightGroups = [];
      let leftCount = 0;
      [...otherGroups].sort((a, b) => b.length - a.length).forEach(g => {
        if (leftCount + g.length <= targetLeft) { leftGroups.push(g); leftCount += g.length; }
        else rightGroups.push(g);
      });

      // Reorder SA within its group to its center position
      const saOthers = saGrp.filter(p => p.id !== sa.id);
      const reorderedSaGrp = [...saOthers.slice(0, saInGroup), sa, ...saOthers.slice(saInGroup)];

      sortedGroups = [...leftGroups, reorderedSaGrp, ...rightGroups];
    }
  }

  const orderedLeaders = sortedGroups.flat();
  const N = orderedLeaders.length;
  if (N === 0) { el.innerHTML = '<div style="padding:20px;color:var(--text-muted)">No advisory staff found.</div>'; return; }

  function groupCsIds(group) {
    const seen = new Set(), result = [];
    group.forEach(pl => (podToCsIds.get(pl.id) || []).forEach(csId => { if (!seen.has(csId)) { seen.add(csId); result.push(csId); } }));
    return result;
  }

  const presentRoles = [];
  if (people.some(p => p.role === 'SA'))   presentRoles.push('SA');
  if (people.some(p => p.role === 'LFA'))  presentRoles.push('LFA');
  if (people.some(p => p.role === 'FA'))   presentRoles.push('FA');
  if (people.some(p => p.role === 'AFA2')) presentRoles.push('AFA2');
  if (people.some(p => p.role === 'AFA1')) presentRoles.push('AFA1');

  const grid = document.createElement('div');
  grid.className = 'sv-role-grid';
  grid.style.cssText = `grid-template-columns:36px repeat(${N},minmax(100px,1fr));border:1px solid var(--border)`;

  function csGroupCell(group) {
    const csIds = groupCsIds(group);
    const primaryColor = csIds.length > 0 ? (csInfoMap.get(csIds[0])?.color || null) : null;
    const cell = document.createElement('div');
    cell.className = 'sv-grid-data-cell sv-cs-header-cell';
    cell.style.gridColumn = `span ${group.length}`;
    if (primaryColor) {
      cell.style.background = primaryColor + '1a';
      cell.style.borderTop = `2px solid ${primaryColor}`;
    } else {
      cell.style.background = 'var(--surface2)';
    }
    if (csIds.length === 0) {
      const noCs = document.createElement('div');
      noCs.style.cssText = 'font-size:9px;color:var(--text-muted);font-style:italic';
      noCs.textContent = 'No CS assigned';
      cell.appendChild(noCs);
    } else {
      csIds.forEach(csId => {
        const info = csInfoMap.get(csId); if (!info) return;
        cell.appendChild(personChip(info.person, 36));
      });
    }
    return cell;
  }

  presentRoles.forEach(role => {
    const rc = ROLE_COLORS[role];
    const lbl = document.createElement('div');
    lbl.className = 'sv-role-label-cell';
    lbl.style.background = rc.bg; lbl.style.color = rc.text;
    lbl.textContent = role;
    grid.appendChild(lbl);

    orderedLeaders.forEach(pl => {
      const group = sortedGroups.find(g => g.includes(pl));
      const csIds = group ? groupCsIds(group) : [];
      const primaryColor = csIds.length > 0 ? (csInfoMap.get(csIds[0])?.color || null) : null;

      const cell = document.createElement('div');
      cell.className = 'sv-grid-data-cell';
      if (primaryColor) cell.style.background = primaryColor + '0d';

      let cellPeople = [];
      if (['SA','LFA','FA'].includes(role)) {
        if (pl.role === role) cellPeople = [pl];
      } else {
        cellPeople = afas.filter(a => a.role === role && resolvedPodIdForTarget(a.id) === pl.id);
      }

      if (cellPeople.length === 0) {
        cell.classList.add('sv-grid-empty-cell');
        if ((role === 'AFA2' || role === 'AFA1') && (pl.role === 'SA' || pl.role === 'LFA')) {
          const slot = document.createElement('div');
          slot.className = 'sv-empty-slot';
          slot.style.cssText = 'width:36px;height:36px;font-size:18px';
          slot.title = 'Add ' + role;
          slot.textContent = '+';
          slot.onclick = () => openAddEventModal({ type: 'new_hire', toRole: role, toTeam: team, supportsIds: [pl.id] });
          cell.appendChild(slot);
        }
      } else {
        cellPeople.forEach(p => cell.appendChild(personChip(p, 36)));
      }
      grid.appendChild(cell);
    });
  });

  if (csList.length > 0) {
    const csLbl = document.createElement('div');
    csLbl.className = 'sv-role-label-cell';
    csLbl.style.cssText = 'background:var(--surface2);color:var(--text-muted);font-size:8px';
    csLbl.textContent = 'CS';
    grid.appendChild(csLbl);
    sortedGroups.forEach(group => grid.appendChild(csGroupCell(group)));
  }

  el.appendChild(grid);
}

// ── Support View Layout ───────────────────────────────────────────────────────
function renderSupportViewLayout(el, team, people, allPeople) {
  const sa = people.find(p => p.role === 'SA');
  const lfas = people.filter(p => p.role === 'LFA').sort((a,b) => a.first.localeCompare(b.first));
  const fas  = people.filter(p => p.role === 'FA').sort((a,b) => a.first.localeCompare(b.first));
  const afas = people.filter(p => p.role === 'AFA2' || p.role === 'AFA1').sort((a,b) => {
    const r = a.role.localeCompare(b.role); return r !== 0 ? r : a.first.localeCompare(b.first);
  });
  const csList = people.filter(p => p.role === 'CSA' || p.role === 'CSC').sort((a,b) => a.first.localeCompare(b.first));

  const podLeaders = [];
  if (sa) podLeaders.push(sa);
  lfas.forEach(l => podLeaders.push(l));
  fas.forEach(f => podLeaders.push(f));

  function primaryPodLeaderId(person) {
    if (!person.supportsIds || !person.supportsIds.length) return null;
    const leadId = person.supportsIds[0];
    const lead = allPeople.find(p => p.id === leadId);
    return (lead && ['SA','LFA','FA'].includes(lead.role)) ? leadId : null;
  }
  function resolvedPodIdForTarget(targetId) {
    const person = allPeople.find(p => p.id === targetId);
    if (!person) return null;
    if (['SA','LFA','FA'].includes(person.role)) return targetId;
    const lid = primaryPodLeaderId(person);
    return lid || null;
  }

  const csInfoMap = new Map();
  csList.forEach(cs => {
    const color = CS_ARROW_COLORS[csInfoMap.size % CS_ARROW_COLORS.length];
    const podIds = new Set();
    (cs.supportsIds || []).forEach(id => { const r = resolvedPodIdForTarget(id); if (r) podIds.add(r); });
    csInfoMap.set(cs.id, { person: cs, color, podIds });
  });

  const podToCsIds = new Map();
  podLeaders.forEach(pl => podToCsIds.set(pl.id, []));
  csInfoMap.forEach((info, csId) => {
    info.podIds.forEach(podId => { if (podToCsIds.has(podId)) podToCsIds.get(podId).push(csId); });
  });

  const groupMap = new Map();
  podLeaders.forEach(pl => {
    const fp = (podToCsIds.get(pl.id) || []).slice().sort().join(',') || '__none__';
    if (!groupMap.has(fp)) groupMap.set(fp, []);
    groupMap.get(fp).push(pl);
  });

  if (podLeaders.length === 0) {
    el.innerHTML = '<div style="padding:20px;color:var(--text-muted)">No advisory staff found.</div>';
    return;
  }

  // Build pod card (leader + AFA members)
  function buildPodCard(pl) {
    const card = document.createElement('div');
    card.className = 'sv-pod';

    const leaderChip = document.createElement('div');
    leaderChip.className = 'sv-leader-chip';
    leaderChip.style.width = '100%';
    if (pl.status === 'leave') leaderChip.classList.add('sv-leave');
    leaderChip.onclick = () => openPersonModal(pl.id);
    const rc = ROLE_COLORS[pl.role];
    leaderChip.appendChild(avatarEl(pl, 36, rc.bg, rc.text, (pl.first[0]+pl.last[0]).toUpperCase(), false));
    const nm = document.createElement('div'); nm.className = 'sv-leader-name';
    if (pl.status === 'leave') nm.classList.add('sv-leave-text');
    nm.textContent = pl.first + ' ' + pl.last;
    leaderChip.appendChild(nm);
    const rb = document.createElement('div'); rb.className = 'sv-role-badge';
    rb.style.background = rc.bg; rb.style.color = rc.text; rb.textContent = pl.role;
    leaderChip.appendChild(rb);
    if (pl.status === 'leave') {
      const lv = document.createElement('div');
      lv.style.cssText = 'font-size:8px;font-weight:700;letter-spacing:0.4px;padding:1px 6px;border-radius:8px;background:#fff3cd;color:#856404;border:1px solid #ffc107;margin-top:1px;white-space:nowrap';
      lv.textContent = 'On Leave';
      leaderChip.appendChild(lv);
    }
    const bar = aumBarEl(pl);
    if (bar) leaderChip.appendChild(bar);
    card.appendChild(leaderChip);

    const arrow = document.createElement('div'); arrow.className = 'sv-arrow';
    arrow.innerHTML = '<div class="sv-arrow-head"></div><div class="sv-arrow-line"></div>';
    card.appendChild(arrow);

    const podAfas = afas.filter(a => resolvedPodIdForTarget(a.id) === pl.id);
    const memberGroup = document.createElement('div'); memberGroup.className = 'sv-member-group';
    if (podAfas.length === 0) {
      const slot = document.createElement('div'); slot.className = 'sv-empty-slot';
      slot.title = 'Add AFA'; slot.textContent = '+';
      slot.onclick = () => openAddEventModal({ type: 'new_hire', toRole: 'AFA2', toTeam: team, supportsIds: [pl.id] });
      memberGroup.appendChild(slot);
    } else {
      podAfas.forEach(a => {
        const chip = document.createElement('div');
        chip.className = 'sv-leader-chip' + (a.status === 'leave' ? ' sv-leave' : '');
        chip.style.cursor = 'pointer'; chip.style.width = 'auto'; chip.style.minWidth = '80px';
        chip.onclick = () => openPersonModal(a.id);
        const arc = ROLE_COLORS[a.role];
        chip.appendChild(avatarEl(a, 36, arc.bg, arc.text, (a.first[0]+a.last[0]).toUpperCase(), false));
        const cn = document.createElement('div'); cn.className = 'sv-leader-name';
        if (a.status === 'leave') cn.classList.add('sv-leave-text');
        cn.textContent = a.first + ' ' + a.last;
        const cr = document.createElement('div'); cr.className = 'sv-role-badge';
        cr.style.background = arc.bg; cr.style.color = arc.text; cr.textContent = a.role;
        chip.appendChild(cn); chip.appendChild(cr);
        if (a.status === 'leave') {
          const lv = document.createElement('div');
          lv.style.cssText = 'font-size:8px;font-weight:700;letter-spacing:0.4px;padding:1px 6px;border-radius:8px;background:#fff3cd;color:#856404;border:1px solid #ffc107;margin-top:1px;white-space:nowrap';
          lv.textContent = 'On Leave';
          chip.appendChild(lv);
        }
        memberGroup.appendChild(chip);
      });
    }
    card.appendChild(memberGroup);
    return card;
  }

  // Sort groups, centering SA's group
  let sortedEntries = Array.from(groupMap.entries());
  const saFp = sa ? (podToCsIds.get(sa.id) || []).slice().sort().join(',') || '__none__' : null;
  let noneEntry = sortedEntries.find(([fp]) => fp === '__none__');
  let csEntries = sortedEntries.filter(([fp]) => fp !== '__none__');
  if (saFp && saFp !== '__none__') {
    const saEntry = csEntries.find(([fp]) => fp === saFp);
    if (saEntry) {
      csEntries = csEntries.filter(([fp]) => fp !== saFp);
      csEntries.splice(Math.floor(csEntries.length / 2), 0, saEntry);
    }
  }
  // Within SA's group (in csEntries), move SA to center pod position
  if (sa && saFp && saFp !== '__none__') {
    const saEntryIdx = csEntries.findIndex(([fp]) => fp === saFp);
    if (saEntryIdx !== -1) {
      const [fp, grp] = csEntries[saEntryIdx];
      if (grp.length > 1) {
        const others = grp.filter(p => p.id !== sa.id);
        const mid = Math.floor(others.length / 2);
        csEntries[saEntryIdx] = [fp, [...others.slice(0, mid), sa, ...others.slice(mid)]];
      }
    }
  }

  const svEl = document.createElement('div');
  svEl.className = 'support-view';

  // CS-grouped pod sections
  csEntries.forEach(([fp, group]) => {
    const csIds = [...new Set(group.flatMap(pl => podToCsIds.get(pl.id) || []))];
    const primaryColor = csIds.length > 0 ? (csInfoMap.get(csIds[0])?.color || null) : null;

    const section = document.createElement('div');
    section.className = 'sv-cs-group';
    if (primaryColor) {
      section.style.background = primaryColor + '12';
      section.style.borderLeft = `3px solid ${primaryColor}`;
    }

    const labelRow = document.createElement('div');
    labelRow.className = 'sv-cs-group-label';
    csIds.forEach(csId => {

// ── Fuzzy Search ──────────────────────────────────────────────────────────────
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = [];
  for (let i = 0; i <= m; i++) { dp[i] = [i]; }
  for (let j = 0; j <= n; j++) { dp[0][j] = j; }
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function fuzzyScore(query, person) {
  const q = query.toLowerCase().trim();
  if (!q) return 0;
  const first = person.first.toLowerCase();
  const last  = person.last.toLowerCase();
  const full  = first + ' ' + last;
  // Exact / substring matches (highest priority)
  if (full === q)           return 100;
  if (full.startsWith(q))  return 95;
  if (full.includes(q))    return 88;
  if (first.startsWith(q)) return 85;
  if (last.startsWith(q))  return 82;
  if (first.includes(q))   return 72;
  if (last.includes(q))    return 70;
  // Fuzzy: try query against first name, last name, full name
  const lf = levenshtein(q, first);
  const ll = levenshtein(q, last);
  const lfl = levenshtein(q, full);
  const maxErr = Math.max(1, Math.floor(q.length / 3));
  if (lf <= maxErr)  return 60 - lf * 8;
  if (ll <= maxErr)  return 55 - ll * 8;
  if (lfl <= maxErr + 1) return 40 - lfl * 4;
  return 0;
}

function handleSearch(query) {
  const dd = document.getElementById('search-dropdown');
  if (!query || !query.trim()) { dd.style.display = 'none'; return; }
  const people = state.people;
  const results = people
    .map(p => ({ p, score: fuzzyScore(query, p) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 8);

  dd.innerHTML = '';
  if (results.length === 0) {
    dd.innerHTML = '<div class="search-no-results">No results found</div>';
  } else {
    results.forEach(({ p }) => {
      const rc = ROLE_COLORS[p.role] || { bg:'#ddd', text:'#333' };
      const item = document.createElement('div');
      item.className = 'search-result';
      // Avatar
      const av = document.createElement('div');
      av.style.cssText = `width:32px;height:32px;border-radius:50%;flex-shrink:0;overflow:hidden;background:${rc.bg};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${rc.text}`;
      const src = PHOTO_DATA[p.id];
      if (src) {
        const img = document.createElement('img');
        img.src = src; img.style.cssText = 'width:100%;height:100%;object-fit:cover';
        av.appendChild(img);
      } else {
        av.textContent = (p.first[0] + p.last[0]).toUpperCase();
      }
      item.appendChild(av);
      // Text
      const info = document.createElement('div');
      const nm = document.createElement('div'); nm.className = 'search-result-name'; nm.textContent = p.first + ' ' + p.last;
      const meta = document.createElement('div'); meta.className = 'search-result-meta'; meta.textContent = p.role + ' · ' + p.team;
      info.appendChild(nm); info.appendChild(meta);
      item.appendChild(info);
      item.onclick = () => {
        document.getElementById('search-input').value = '';

function maybeOfferBackfill(event) {
  if (event.type !== 'promotion' || !event.personId) return;
  const person = state.people.find(p => p.id === event.personId);

  return false;
}

// Builds a "Supported By" section for SA/LFA/FA — reverse lookup of who supports this person.
// pendingUpdates: array to collect {supporterId, personId, add} changes to apply on Save.
function buildSupportedByUI(personId, team, containerEl, pendingUpdates) {
  containerEl.innerHTML = '';
  if (!team) {
    const warn = document.createElement('div');
    warn.style.cssText = 'color:var(--warning-text);background:var(--warning-bg);border-radius:6px;padding:7px 10px;font-size:12px;margin-top:10px';
    warn.textContent = 'Select a team to see support options.';
    containerEl.appendChild(warn);
    return;
  }
  const section = document.createElement('div');
  section.className = 'criteria-section';
  const titleEl = document.createElement('div');
  titleEl.className = 'criteria-title';
  titleEl.textContent = 'Supported By';
  section.appendChild(titleEl);

  const visiblePeople = getVisiblePeople();
  const potentialSupporters = visiblePeople.filter(p =>
    ['AFA2', 'AFA1', 'CSA', 'CSC'].includes(p.role) && p.team === team
  );

  if (potentialSupporters.length === 0) {
    const note = document.createElement('div');
    note.style.cssText = 'color:#999;font-size:12px;font-style:italic;padding:4px 0';
    note.textContent = 'No AFA or CS staff on this team yet.';
    section.appendChild(note);
  } else {
    potentialSupporters.forEach(supporter => {
      // Check real supportsIds: for nh_ supporter check the event, else check state.people
      let currentSupportsIds = [];
      if (supporter.id.startsWith('nh_')) {
        const evId = supporter.id.slice(3);
        const sEv = state.events.find(x => x.id === evId);
        currentSupportsIds = sEv ? (sEv.supportsIds || []) : [];
      } else {
        const sp = state.people.find(x => x.id === supporter.id);
        currentSupportsIds = sp ? (sp.supportsIds || []) : [];
      }
      const isSupporting = currentSupportsIds.includes(personId);

      const item = document.createElement('div');
      item.className = 'criteria-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = isSupporting;
      cb.onchange = (e) => {
        const newState = e.target.checked;
        // Remove existing pending update for this supporter, then add new one if changed
        const existingIdx = pendingUpdates.findIndex(u => u.supporterId === supporter.id);
        if (existingIdx >= 0) pendingUpdates.splice(existingIdx, 1);
        if (newState !== isSupporting) {
          pendingUpdates.push({ supporterId: supporter.id, personId, add: newState });
        }
      };
      const l = document.createElement('label');
      l.style.cssText = 'display:flex;flex-direction:column;gap:1px';
      const nameSpan = document.createElement('span');
      nameSpan.textContent = supporter.first + ' ' + supporter.last;
      const roleSpan = document.createElement('span');
      roleSpan.style.cssText = 'font-size:10px;color:var(--text-muted)';
      roleSpan.textContent = supporter.role + (supporter.id.startsWith('nh_') ? ' · incoming' : '');
      l.appendChild(nameSpan); l.appendChild(roleSpan);
      item.appendChild(cb); item.appendChild(l);
      section.appendChild(item);
    });
  }
  containerEl.appendChild(section);
}

function applyPendingUpdates(pendingUpdates) {
  pendingUpdates.forEach(u => {
    if (u.supporterId.startsWith('nh_')) {
      const evId = u.supporterId.slice(3);
      const sEv = state.events.find(x => x.id === evId);
      if (sEv) {
        if (!sEv.supportsIds) sEv.supportsIds = [];
        if (u.add && !sEv.supportsIds.includes(u.personId)) sEv.supportsIds.push(u.personId);
        if (!u.add) sEv.supportsIds = sEv.supportsIds.filter(id => id !== u.personId);
      }
    } else {
      const sp = state.people.find(x => x.id === u.supporterId);
      if (sp) {
        if (!sp.supportsIds) sp.supportsIds = [];
        if (u.add && !sp.supportsIds.includes(u.personId)) sp.supportsIds.push(u.personId);
        if (!u.add) sp.supportsIds = sp.supportsIds.filter(id => id !== u.personId);
      }
    }
  });
}

// Builds (or rebuilds) the "Supports" checkbox section inside the person modal.
function buildPersonSupportsUI(person, containerEl) {
  containerEl.innerHTML = '';
  const fg = document.createElement('div');
  fg.className = 'fg';
  const lbl = document.createElement('label');
  lbl.className = 'fl';
  lbl.textContent = 'Supports';
  fg.appendChild(lbl);

  const supportList = document.createElement('div');
  supportList.style.fontSize = '12px';

  if (!person.team) {
    const warn = document.createElement('div');
    warn.style.cssText = 'color:var(--warning-text);background:var(--warning-bg);border-radius:6px;padding:7px 10px;font-size:12px;';
    warn.textContent = 'Select a team above to see support options.';
    supportList.appendChild(warn);
  } else {
    const visiblePeople = getVisiblePeople();
    const advisors = visiblePeople.filter(p =>
      ['SA', 'LFA', 'FA'].includes(p.role) && p.team === person.team && p.id !== person.id
    );
    if (advisors.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'color:#999;font-size:12px;font-style:italic;padding:4px 0';
      empty.textContent = 'No SA / LFA / FA found on this team.';
      supportList.appendChild(empty);
    } else {
      advisors.forEach(ad => {
        const item = document.createElement('div');
        item.className = 'criteria-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = (person.supportsIds || []).includes(ad.id);
        cb.onchange = (e) => {
          if (!person.supportsIds) person.supportsIds = [];
          if (e.target.checked) {
            if (!person.supportsIds.includes(ad.id)) person.supportsIds.push(ad.id);
          } else {
            person.supportsIds = person.supportsIds.filter(id => id !== ad.id);
          }
        };
        const l = document.createElement('label');
        l.textContent = ad.first + ' ' + ad.last + ' (' + ad.role + (ad.id.startsWith('nh_') ? ' · incoming' : '') + ')';
        item.appendChild(cb);
        item.appendChild(l);
        supportList.appendChild(item);
      });
    }
  }
  fg.appendChild(supportList);
  containerEl.appendChild(fg);
}

// Builds (or rebuilds) the "Supports" checkbox section inside an event modal.
// containerEl is a dedicated div; its contents are fully replaced each call.
// Only renders for AFA2/AFA1/CSA/CSC roles; clears and hides for anything else.
function buildEventSupportsUI(event, containerEl) {
  containerEl.innerHTML = '';
  const AFA_CS_ROLES = new Set(['AFA2', 'AFA1', 'CSA', 'CSC']);
  if (!AFA_CS_ROLES.has(event.toRole)) {
    containerEl.style.display = 'none';
    return;
  }
  containerEl.style.display = '';
  containerEl.className = 'fg';

  const lbl = document.createElement('label');
  lbl.className = 'fl';
  lbl.textContent = 'Supports';
  containerEl.appendChild(lbl);

  const supportList = document.createElement('div');
  supportList.style.fontSize = '12px';

  if (!event.toTeam) {
    const warn = document.createElement('div');
    warn.style.cssText = 'color:var(--warning-text);background:var(--warning-bg);border-radius:6px;padding:7px 10px;font-size:12px;';
    warn.textContent = 'Select a team above to see support options.';
    supportList.appendChild(warn);
    containerEl.appendChild(supportList);
    return;
  }

  const visiblePeople = getVisiblePeople();
  const advisors = visiblePeople.filter(p =>
    ['SA', 'LFA', 'FA'].includes(p.role) && p.team === event.toTeam
  );

  if (advisors.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'color:#999;font-size:12px;font-style:italic;padding:4px 0';
    empty.textContent = 'No SA / LFA / FA found on this team.';
    supportList.appendChild(empty);
  } else {
    advisors.forEach(ad => {
      const item = document.createElement('div');
      item.className = 'criteria-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = 'esup_' + ad.id;
      cb.checked = (event.supportsIds || []).includes(ad.id);
      cb.onchange = () => {
        if (!event.supportsIds) event.supportsIds = [];
        if (cb.checked) {
          if (!event.supportsIds.includes(ad.id)) event.supportsIds.push(ad.id);
        } else {
          event.supportsIds = event.supportsIds.filter(id => id !== ad.id);
        }
      };
      const lbl2 = document.createElement('label');
      lbl2.htmlFor = 'esup_' + ad.id;
      lbl2.textContent = `${ad.first} ${ad.last} (${ad.role}${ad.id.startsWith('nh_') ? ' · incoming' : ''})`;
      item.appendChild(cb);
      item.appendChild(lbl2);
      supportList.appendChild(item);
    });
  }
  containerEl.appendChild(supportList);
}

// Rebuilds the dynamic supports/supported-by container inside an event modal.
// Only shows "Supported By" for new_hire events where the role is SA/LFA/FA.
function rebuildEventSupportsSection(event, container, pendingUpdates) {
  container.innerHTML = '';
  pendingUpdates.length = 0;
  if (event.type === 'new_hire' && ['SA','LFA','FA'].includes(event.toRole) && event.toTeam) {
    buildSupportedByUI('nh_' + event.id, event.toTeam, container, pendingUpdates);
  } else {
    buildEventSupportsUI(event, container);
  }
}

  const fgSupports = document.createElement('div');
  rebuildEventSupportsSection(event, fgSupports, pendingUpdates);
  body.appendChild(fgSupports);

  const fg8 = document.createElement('div');
  fg8.className = 'fg';
  const l8 = document.createElement('label');
  l8.className = 'fl';
  l8.textContent = 'Notes';
  const ta = document.createElement('textarea');
  ta.className = 'ftextarea';
  ta.value = event.notes;
  ta.onchange = (e) => { event.notes = e.target.value; };
  fg8.appendChild(l8);
  fg8.appendChild(ta);
  body.appendChild(fg8);

  modal.appendChild(body);

  const footer = document.createElement('div');
  footer.className = 'modal-footer';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-primary';
  saveBtn.textContent = 'Save';
  saveBtn.onclick = () => {
    applyPendingUpdates(pendingUpdates);
    state.events.push(event);
    saveState();
    render();
    if (!maybeOfferBackfill(event)) {
      modalRoot.innerHTML = '';
      modalRoot.style.display = 'none';
    }
  };
  footer.appendChild(saveBtn);
  modal.appendChild(footer);

  overlay.appendChild(modal);
  overlay.onclick = (e) => {
    if (e.target === overlay) {
      modalRoot.innerHTML = '';
      modalRoot.style.display = 'none';
    }
  };

  modalRoot.innerHTML = '';
  modalRoot.appendChild(overlay);
  modalRoot.style.display = 'block';
}

function editEvent(eventId) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return;

  const event = JSON.parse(JSON.stringify(ev));
  const modalRoot = document.getElementById('modal-root');
  const overlay = document.createElement('div');
  overlay.className = 'overlay';

  const modal = document.createElement('div');
  modal.className = 'modal';

  const header = document.createElement('div');
  header.className = 'modal-hdr';
  const title = document.createElement('h3');
  title.textContent = 'Edit Event';
  header.appendChild(title);
  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.textContent = '×';
  closeBtn.onclick = () => { modalRoot.innerHTML = ''; modalRoot.style.display = 'none'; };
  header.appendChild(closeBtn);
  modal.appendChild(header);

  const body = document.createElement('div');
  body.className = 'modal-body';

  const fg1 = document.createElement('div');
  fg1.className = 'fg';
  const l1 = document.createElement('label');
  l1.className = 'fl';
  l1.textContent = 'Event Type';
  const fs1 = document.createElement('select');
  fs1.className = 'fs';
  EVENT_TYPES.forEach(et => {
    const opt = document.createElement('option');
    opt.value = et.value;
    opt.textContent = et.label;
    fs1.appendChild(opt);
  });
  fs1.value = event.type;
  fs1.onchange = (e) => { event.type = e.target.value; };
  fg1.appendChild(l1);
  fg1.appendChild(fs1);
  body.appendChild(fg1);

  const fg2 = document.createElement('div');
  fg2.className = 'fg';
  const l2 = document.createElement('label');
  l2.className = 'fl';
  l2.textContent = 'Date';
  const fi2 = document.createElement('input');
  fi2.className = 'fi';
  fi2.type = 'date';
  fi2.value = event.date;
  fi2.onchange = (e) => { event.date = e.target.value; };
  fg2.appendChild(l2);
  fg2.appendChild(fi2);
  body.appendChild(fg2);

  const fg3 = document.createElement('div');
  fg3.className = 'fg';
  const l3 = document.createElement('label');
  l3.className = 'fl';
  l3.textContent = 'Person';
  const fs3 = document.createElement('select');
  fs3.className = 'fs';
  const opt0 = document.createElement('option');
  opt0.value = '';
  opt0.textContent = 'Select person...';
  fs3.appendChild(opt0);
  state.people.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.first + ' ' + p.last + ' (' + p.role + ')';
    fs3.appendChild(opt);
  });
  fs3.value = event.personId || '';
  fs3.onchange = (e) => { event.personId = e.target.value || null; };
  fg3.appendChild(l3);
  fg3.appendChild(fs3);
  body.appendChild(fg3);

  const fg4 = document.createElement('div');
  fg4.className = 'fg';
  const l4 = document.createElement('label');
  l4.className = 'fl';
  l4.textContent = 'New Hire First Name (if applicable)';
  const fi4 = document.createElement('input');
  fi4.className = 'fi';
  fi4.type = 'text';
  fi4.value = event.newFirst;
  fi4.onchange = (e) => { event.newFirst = e.target.value; };
  fg4.appendChild(l4);
  fg4.appendChild(fi4);
  body.appendChild(fg4);

  const fg5 = document.createElement('div');
  fg5.className = 'fg';
  const l5 = document.createElement('label');
  l5.className = 'fl';
  l5.textContent = 'New Hire Last Name (if applicable)';
  const fi5 = document.createElement('input');
  fi5.className = 'fi';
  fi5.type = 'text';
  fi5.value = event.newLast;
  fi5.onchange = (e) => { event.newLast = e.target.value; };
  fg5.appendChild(l5);
  fg5.appendChild(fi5);
  body.appendChild(fg5);

  const fg6 = document.createElement('div');
  fg6.className = 'fg';
  const l6 = document.createElement('label');
  l6.className = 'fl';
  l6.textContent = 'To Role (if applicable)';
  const fs6 = document.createElement('select');
  fs6.className = 'fs';
  ROLES.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = ROLE_LABELS[r] || r;
    fs6.appendChild(opt);
  });
  fs6.value = event.toRole;
  fs6.onchange = (e) => {
    event.toRole = e.target.value;
    rebuildEventSupportsSection(event, fgSupportsEdit, pendingUpdatesEdit);
  };
  fg6.appendChild(l6);
  fg6.appendChild(fs6);
  body.appendChild(fg6);

  const fg7 = document.createElement('div');
  fg7.className = 'fg';
  const l7 = document.createElement('label');
  l7.className = 'fl';
  l7.textContent = 'To Team (if applicable)';
  const fs7 = document.createElement('select');
  fs7.className = 'fs';
  const opt0b = document.createElement('option');
  opt0b.value = '';
  opt0b.textContent = '—';
  fs7.appendChild(opt0b);
  Object.keys(TEAMS).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    fs7.appendChild(opt);
  });
  fs7.value = event.toTeam;
  fs7.onchange = (e) => {
    event.toTeam = e.target.value;
    rebuildEventSupportsSection(event, fgSupportsEdit, pendingUpdatesEdit);
  };
  fg7.appendChild(l7);
  fg7.appendChild(fs7);
  body.appendChild(fg7);

  // Supports / Supported By section — shown dynamically based on role
  const pendingUpdatesEdit = [];
  const fgSupportsEdit = document.createElement('div');
  rebuildEventSupportsSection(event, fgSupportsEdit, pendingUpdatesEdit);
  body.appendChild(fgSupportsEdit);

  const fg8 = document.createElement('div');
  fg8.className = 'fg';
  const l8 = document.createElement('label');
  l8.className = 'fl';
  l8.textContent = 'Notes';
  const ta = document.createElement('textarea');
  ta.className = 'ftextarea';
  ta.value = event.notes;
  ta.onchange = (e) => { event.notes = e.target.value; };
  fg8.appendChild(l8);
  fg8.appendChild(ta);
  body.appendChild(fg8);

  modal.appendChild(body);

  const footer = document.createElement('div');
  footer.className = 'modal-footer spread';
  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'btn-danger';
  deleteBtn.textContent = 'Delete';
  deleteBtn.onclick = () => {
    state.events = state.events.filter(e => e.id !== eventId);
    saveState();
    render();
    modalRoot.innerHTML = '';
    modalRoot.style.display = 'none';
  };
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-primary';
  saveBtn.textContent = 'Save';
  saveBtn.onclick = () => {
    applyPendingUpdates(pendingUpdatesEdit);
    const isNew = !state.events.find(e => e.id === eventId);
    const idx = state.events.findIndex(e => e.id === eventId);
    if (idx >= 0) state.events[idx] = event;
    saveState();
    render();
    // Only offer backfill when saving a brand-new promotion (not re-saving an edit)
    if (isNew && !maybeOfferBackfill(event)) {
      modalRoot.innerHTML = '';
      modalRoot.style.display = 'none';
    } else if (!isNew) {
      modalRoot.innerHTML = '';
      modalRoot.style.display = 'none';
    }
  };
  footer.appendChild(deleteBtn);
  footer.appendChild(saveBtn);
  modal.appendChild(footer);

  overlay.appendChild(modal);
  overlay.onclick = (e) => {
    if (e.target === overlay) {
      modalRoot.innerHTML = '';
      modalRoot.style.display = 'none';
    }
  };

  modalRoot.innerHTML = '';
  modalRoot.appendChild(overlay);
  modalRoot.style.display = 'block';
}

function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'headcount-planner-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}


// Initialize
window.addEventListener('DOMContentLoaded', () => {
  
  render();
});
</script>
